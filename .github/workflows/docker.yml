name: Docker Build and Deploy

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: kunzzz999/backdaitalk   # Docker Hub 只有 “命名空间/仓库名” 这一级

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: python -m pytest test_format_repair_integration.py -v
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # 👇 改为登录 Docker Hub（无 registry 字段）
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          # 👇 扫描刚推送的镜像；默认分支会是 latest，分支会是 main/develop，tag 触发是 vX.Y.Z
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.ref_type == 'tag' && github.ref_name || (github.ref_name == github.event.repository.default_branch && 'latest' || github.ref_name) }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy-staging:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - run: |
          echo "Deploying to staging..."
          echo "Image: ${{ env.IMAGE_NAME }}:develop"
          # kubectl set image deployment/eztalk-proxy eztalk-proxy=${{ env.IMAGE_NAME }}:develop

  deploy-production:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - run: |
          echo "Deploying to production..."
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          # kubectl set image deployment/eztalk-proxy eztalk-proxy=${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  notify:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-staging.result != 'skipped' || needs.deploy-production.result != 'skipped')
    steps:
      - run: |
          if [[ "${{ needs.deploy-staging.result }}" == "success" ]]; then echo "✅ Staging OK"; fi
          if [[ "${{ needs.deploy-staging.result }}" == "failure" ]]; then echo "❌ Staging Failed"; fi
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then echo "✅ Prod OK"; fi
          if [[ "${{ needs.deploy-production.result }}" == "failure" ]]; then echo "❌ Prod Failed"; fi
